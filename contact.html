<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Ella Livnat Eyal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>ELLA LIVNAT EYAL</h1>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <ul>
            <li><a href="about.html">About</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="contact-page">
        <section class="contact-hero">
            <h2>Contact</h2>
        </section>

        <section class="contact-container">
            <div class="contact-form-wrapper">
                <form class="contact-form" action="https://formspree.io/f/xgoqoapk" method="POST">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send</button>
                </form>
            </div>
        </section>

        <section class="contact-icons">
        </section>
    </main>

    <footer class="footer">
        <div class="footer-icons">
            <a href="mailto:livnateyal17@gmail.com" class="icon-link">
                <img src="mail icon.png" alt="Email">
            </a>
            <a href="https://www.instagram.com/ellartss_?igsh=YTI3Mmw4dDh3ZGZs&utm_source=qr" target="_blank" class="icon-link instagram-icon">
                <img src="instagram icon.png" alt="Instagram">
            </a>
        </div>
        <p class="footer-copyright">© 2026 Ella Livnat Eyal</p>
    </footer>

    <script>
        // Remove hash from URL and scroll to top
        if (window.location.hash) {
            window.location.hash = '';
        }
        
        // Force scroll to top immediately
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;

        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');

        hamburger.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('active');
            });
        });
    </script>
</body>
</html>
